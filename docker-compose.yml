services:
  # ─── Traefik Reverse Proxy ──────────────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: always
    command:
      # API / Dashboard
      - "--api.dashboard=true"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # HTTP entrypoint
      - "--entrypoints.web.address=:80"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      # Redirect HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-contact@alsek.fr}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/letsencrypt"
    networks:
      - web
    labels:
      # Dashboard (optionnel — accessible via traefik.audit.alsek.fr)
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.audit.alsek.fr`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      # Dashboard auth (admin:admin par défaut — changer en production !)
      # Générer un hash : echo $(htpasswd -nB admin) | sed -e s/\\$/\\$\\$/g
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:$$2y$$05$$placeholder}"

  # ─── Audit App ──────────────────────────────────────────────
  audit-app:
    build: .
    container_name: audit-alsek
    restart: always
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # Router
      - "traefik.http.routers.audit.rule=Host(`audit.alsek.fr`)"
      - "traefik.http.routers.audit.entrypoints=websecure"
      - "traefik.http.routers.audit.tls.certresolver=letsencrypt"
      # Service
      - "traefik.http.services.audit.loadbalancer.server.port=3000"

volumes:
  traefik-certs:
  app-data:

networks:
  web:
    driver: bridge
